plugins {
    id 'com.android.application'
}

android {
    namespace 'com.aulapronta.pro'
    compileSdk 35

    defaultConfig {
        applicationId "com.aulapronta.pro"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
